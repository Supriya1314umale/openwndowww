        .how-image img {
            width: 100%;
            max-width: 350px;
            aspect-ratio: 1 / 1;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            margin: 0 auto;
        }
        /* Default desktop */
.nav-links {
  display: flex;
  list-style: none;
  gap: 30px;
}

/* Hide menu toggle on desktop */
.menu-toggle {
  display: none;
  font-size: 28px;
  cursor: pointer;
}

/* Mobile */
@media (max-width: 768px) {

  .menu-toggle {
    display: block;
  }

  .nav-links {
    position: absolute;
    top: 70px;
    right: 0;
    background: #cfd8d3;
    width: 100%;
    flex-direction: column;
    align-items: center;
    display: none;
    padding: 20px 0;
  }

  .nav-links.active {
    display: flex;
  }
}

/* ================= LOGIN BACKGROUND SECTION ================= */
.login-section{
  background:url("wallpaper\ \(1\).png") no-repeat center center;
  background-size:cover;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
  padding:40px 20px;
}

/* Overlay */
.login-section::before{
  content:"";
  position:absolute;
  inset:0;
  /* background: #f4f4f4;
  z-index: 1; */
  /* background:rgba(0,0,0,0.4); */
}

.login-section > *{
  position:relative;
  z-index:2;
  
}

/* ================= LOGIN CARD ================= */
.login-card{
  background:white;
  padding:40px;
  border-radius:20px;
  width:100%;
  max-width:400px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  text-align:center;
}

.login-card input{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border-radius:25px;
  border:1px solid #ccc;
}

.login-card button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:25px;
  background:#f3aaaa;
  color:white;
  cursor:pointer;
  transition:0.3s;
}

.login-card button:hover{
  background:#996767;
}

.forgot{
  display:block;
  margin-top:10px;
  font-size:14px;
  text-decoration:none;
  color:#333;
}

.how-waves svg {
    display: block;
    width: 100%;
    height: 109px;
}
